name: UI SSOT Verify

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  verify-ui-ssot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Verify UI SSOT and perf guards
        run: node scripts/verify-ui-ssot.mjs
