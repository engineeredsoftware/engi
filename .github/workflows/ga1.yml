name: CI - GA1 Core

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Lint core
        run: pnpm run lint:core
      - name: Typecheck core
        run: pnpm run typecheck:core
      - name: Run AssetPack bring-up tests
        run: pnpm -C packages/pipelines/asset-pack test

  codegen-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Detect squashed schema presence
        id: detect
        run: |
          if [ -f supabase/migrations/000_squashed.sql ] && grep -Eq 'CREATE TABLE|ALTER TABLE|deliverables_pipeline' supabase/migrations/000_squashed.sql; then
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "present=false" >> $GITHUB_OUTPUT
          fi
      - name: Run runtime DB codegen
        if: steps.detect.outputs.present == 'true'
        run: pnpm -C packages/orm run codegen:db
      - name: Check no codegen drift
        if: steps.detect.outputs.present == 'true'
        run: |
          git diff --exit-code || (echo 'Codegen drift detected. Run pnpm -C packages/orm run codegen:db and commit changes.' && exit 1)

  db-verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: engi
        ports: [ '5432:5432' ]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply squashed schema (placeholder is OK)
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d engi -f supabase/migrations/000_squashed.sql
