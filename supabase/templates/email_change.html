<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm your new Bitcode email</title>
    <style>
      body { 
        margin: 0; 
        padding: 20px; 
        background: white; 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .container { 
        max-width: 600px; 
        margin: auto; 
        background: white; 
      }
      .header { 
        padding: 20px 0; 
        text-align: center; 
        border-bottom: 1px solid #f0f0f0; 
        margin-bottom: 30px; 
      }
      .content { 
        font-size: 16px; 
        line-height: 1.5; 
        color: #4a4a4a; 
      }
      h1 { 
        margin: 0 0 20px; 
        font-size: 24px; 
        font-weight: 600; 
        color: #1a1a1a; 
      }
      .footer { 
        padding: 30px 0 20px; 
        text-align: center; 
        font-size: 12px; 
        color: #6a6a6a; 
        border-top: 1px solid #f0f0f0; 
        margin-top: 40px; 
      }
      a { 
        color: #BA54EC; 
        text-decoration: none; 
      }
      .button { 
        display: inline-block; 
        padding: 12px 24px; 
        background: #BA54EC; 
        color: white; 
        text-decoration: none; 
        border-radius: 6px; 
        font-weight: 500; 
        margin: 0 8px 8px 0;
      }
      .preview-text { 
        display: none !important; 
        opacity: 0; 
        color: transparent; 
        mso-hide: all; 
        line-height: 0; 
        font-size: 0; 
        max-height: 0; 
        max-width: 0; 
        overflow: hidden; 
      }
      table { 
        width: 100%; 
        border-collapse: collapse; 
      }
      td { 
        padding: 5px 0; 
        vertical-align: top; 
      }
    </style>
  </head>
  <body>
    <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
      <tr>
        <td align="center">
          <div class="container">
            
            <div class="header">
              <svg width="38" height="33" viewBox="0 0 38 33" style="color: #1a1a1a;">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M21.986 27.9681C26.9054 27.9681 31.1307 24.9966 32.965 20.7505H37.288C35.2684 27.2825 29.1814 32.028 21.986 32.028C14.7906 32.028 8.70363 27.2825 6.68403 20.7505H11.007C12.8413 24.9966 17.0666 27.9681 21.986 27.9681ZM21.986 4.05989C17.0666 4.05989 12.8413 7.03142 11.007 11.2775H6.68403C8.70363 4.7455 14.7906 0 21.986 0C29.1814 0 35.2684 4.7455 37.288 11.2775H37.2899C37.9004 13.3956 38 15.0349 38 15.7885C38 16.9903 37.9004 17.8207 37.9004 17.8207H0L3.15769 13.8674H20.5947H29.3665H33.7498C33.7498 13.8674 33.489 12.4052 32.9657 11.2775H32.965C31.1307 7.03142 26.9054 4.05989 21.986 4.05989Z" fill="currentColor"/>
              </svg>
            </div>
            
            <div class="content">

              <div class="preview-text">
                Confirm your new email on Bitcode
              </div>

              <h1>Confirm your new email</h1>

              <p>
                Click the button below to confirm that you'd like to use <strong>{{ .Email }}</strong> as your new login email on Bitcode.
              </p>

              <p style="text-align: center; margin: 30px 0;">
                <a href="{{ .ConfirmationURL }}" class="button">Confirm email change</a>
              </p>

            </div>
            
            <div class="footer">© {{ .Year }} Advanced Engineered Software, Inc.</div>
            
          </div>
        </td>
      </tr>
    </table>
  </body>
</html>
