<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Out of $BTD</title>
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #1a1a1a;
    }
    .container { 
      max-width: 600px; 
      margin: 0 auto; 
      padding: 40px 20px;
    }
    .logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo svg {
      width: 48px;
      height: 42px;
      color: #BA54EC;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 16px;
      color: #1a1a1a;
    }
    p {
      margin: 0 0 16px;
      color: #4a4a4a;
    }
    .alert-box {
      background: #fef2f2;
      border-left: 4px solid #dc2626;
      border-radius: 8px;
      padding: 24px;
      margin: 32px 0;
      text-align: center;
    }
    .zero-credits {
      font-size: 48px;
      font-weight: 700;
      color: #dc2626;
      margin-bottom: 8px;
    }
    .zero-label {
      font-size: 14px;
      color: #991b1b;
    }
    .button {
      display: inline-block;
      padding: 14px 32px;
      background: #BA54EC;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      margin: 24px 0;
    }
    .footer {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid #e0e0e0;
      font-size: 12px;
      color: #6a6a6a;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg width="38" height="33" viewBox="0 0 38 33">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M21.986 27.9681C26.9054 27.9681 31.1307 24.9966 32.965 20.7505H37.288C35.2684 27.2825 29.1814 32.028 21.986 32.028C14.7906 32.028 8.70363 27.2825 6.68403 20.7505H11.007C12.8413 24.9966 17.0666 27.9681 21.986 27.9681ZM21.986 4.05989C17.0666 4.05989 12.8413 7.03142 11.007 11.2775H6.68403C8.70363 4.7455 14.7906 0 21.986 0C29.1814 0 35.2684 4.7455 37.288 11.2775H37.2899C37.9004 13.3956 38 15.0349 38 15.7885C38 16.9903 37.9004 17.8207 37.9004 17.8207H0L3.15769 13.8674H20.5947H29.3665H33.7498C33.7498 13.8674 33.489 12.4052 32.9657 11.2775H32.965C31.1307 7.03142 26.9054 4.05989 21.986 4.05989Z" fill="currentColor"/>
      </svg>
    </div>

    <h1>Out of $BTD</h1>
    
    <p>Hello {{name}},</p>
    
    <p>Your $BTD balance has reached zero. You need $BTD to run Bitcode deliveries and agentic updates.</p>

    <div class="alert-box">
      <div class="zero-credits">0</div>
      <div class="zero-label">$BTD Remaining</div>
    </div>

    <p>Add $BTD now to continue using Bitcode's software agents for your projects.</p>

    <p style="text-align: center;">
      <a href="{{purchaseUrl}}" class="button">Add $BTD Now</a>
    </p>

    <div class="footer">
      © {{year}} Advanced Engineered Software, Inc.
    </div>
  </div>
</body>
</html>
