project_id = "tkpyosihuouusyaxtbau"

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = []
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_manual_linking = false
minimum_password_length = 6
password_requirements = ""
rate_limit = { email_sent = 2, sms_sent = 30, anonymous_users = 30, token_refresh = 150 }

# Built-in OAuth providers remain disabled for V28 staging-testnet.
# Bitcoin wallet auth uses Bitcode's custom OAuth2 provider, and GitHub
# repository access uses the GitHub App integration rather than Supabase SSO.
[auth.external.google]
enabled = false

[auth.external.github]
enabled = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 6
otp_expiry = 86400

[auth.email.template]

# Custom email templates for local development.
# Each template points to an HTML file located in ./supabase/templates.

[auth.email.template.invite]
subject = "You're invited to Bitcode"
content_path = "./supabase/templates/invite.html"

[auth.email.template.confirmation]
subject = "Confirm your Bitcode account"
content_path = "./supabase/templates/confirm.html"

[auth.email.template.recovery]
subject = "Reset your Bitcode password"
content_path = "./supabase/templates/password_recovery.html"

[auth.email.template.magic_link]
subject = "Your Bitcode magic link"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.email_change]
subject = "Confirm your new email address"
content_path = "./supabase/templates/email_change.html"


[auth.sms]
enable_signup = false

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
