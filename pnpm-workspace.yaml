packages:
  # The Next.js webapp (uapi) manages its dependencies independently.
  # Exclude the app from pnpm workspace to avoid lock-file divergence issues.
  #
  # Packages consumed by this app remain in the workspace so they can
  # depend on them via "workspace:*".
  #
  - 'uapi'
  - 'uapi/**'
  # Exclude test fixture repos from workspace to avoid CI frozen-lockfile errors
  - '!uapi/tests/fixtures/**'
  - 'packages/*'
  - 'packages/*/*'
  - 'packages/*/*/*'
  - 'engi-dev-cli'
